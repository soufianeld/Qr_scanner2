






<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: 'Segoe UI';
  background-color: #f5f5f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
}

#reader {
  width: 350px;
  margin-top: 20px;
  border: 2px solid #3498db;
  border-radius: 10px;
  background-color: #ecf0f1;
  padding: 10px;
}

#result { margin-top: 20px; font-weight: bold; }
.saved { color: green; }
.duplicate { color: red; }

#history {
  margin-top: 20px;
  width: 350px;
  list-style: none;
  padding: 10px;
  background: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>QR Scanner</h2>

<button onclick="startScanner()">▶️ Start Scanner</button>

<div id="reader"></div>
<p id="result"></p>

<h3>Last 10 QR Codes</h3>
<ul id="history"></ul>

<script>
let lastScanned = "";
let historyList = [];
let isProcessing = false;
let scanner;

// 🔊 Web Audio (100% خدام ف iPhone)
let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playBeep() {
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}

function onScanSuccess(decodedText) {

  if (isProcessing) return;
  if (decodedText === lastScanned) return;

  isProcessing = true;
  lastScanned = decodedText;

  const resultEl = document.getElementById("result");

  // ❌ duplicate
  if (historyList.includes(decodedText)) {
    resultEl.innerText = "❌ Duplicate: " + decodedText;
    resultEl.className = "duplicate";
    playBeep();
    isProcessing = false;
    return;
  }

  // ✅ عرض مباشر
  resultEl.innerText = "⏳ Saving: " + decodedText;
  resultEl.className = "saved";
  playBeep();

  // history
  historyList.unshift(decodedText);
  if (historyList.length > 10) historyList.pop();

  document.getElementById("history").innerHTML =
    historyList.map(code => `<li>${code}</li>`).join('');

  // save background
  fetch("https://script.google.com/macros/s/AKfycbwyhRPVm0o5LsaG6kge7fd9fJjyMiKRvhq3UpQSV3yYn_reTGZdrqotiPfeMBFBxm4/exec?code=" + encodeURIComponent(decodedText))
  .then(() => {
    resultEl.innerText = "✅ Saved: " + decodedText;
  })
  .catch(() => {
    resultEl.innerText = "⚠️ Save failed";
    resultEl.className = "duplicate";
  })
  .finally(() => {
    setTimeout(() => { isProcessing = false; }, 800);
  });
}

// config
const config = {
  fps: 15,
  qrbox: { width: 250, height: 250 },
  rememberLastUsedCamera: true,
  showTorchButtonIfSupported: true
};

// ▶️ start scanner
function startScanner() {
  initAudio(); // 🔥 مهم بزاف للصوت

  if (scanner) return; // باش مايتعاودش

  scanner = new Html5QrcodeScanner("reader", config, false);
  scanner.render(onScanSuccess);
}
</script>

</body>
</html>

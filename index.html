
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      color: #333;
    }

    h2 { color: #2c3e50; }

    #reader {
      width: 350px;
      margin-top: 20px;
      border: 2px solid #3498db;
      border-radius: 10px;
      background-color: #ecf0f1;
      padding: 10px;
    }

    #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    .saved { color: green; }
    .duplicate { color: red; }

    #history {
      margin-top: 20px;
      width: 350px;
      list-style: none;
      padding: 10px;
      background-color: #fff;
      border: 1px solid #bdc3c7;
      border-radius: 8px;
    }

    #history li { padding: 5px 10px; border-bottom: 1px solid #ecf0f1; }
    #history li:last-child { border-bottom: none; }
  </style>
</head>
<body>

<h2>QR Scanner</h2>
<div id="reader"></div>

<p id="result"></p>

<h3>Last 5 QR Codes</h3>
<ul id="history"></ul>

<script>
let lastScanned = "";
let historyList = [];
let scanner;

// إنشاء عنصر صوتي beep صغير
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg"); // link صوت قصير جاهز

function onScanSuccess(decodedText) {
    if (decodedText === lastScanned) return;
    lastScanned = decodedText;

    const resultEl = document.getElementById("result");

    // إذا الكود مكرر
    if(historyList.includes(decodedText)){
        resultEl.innerText = "Duplicate code! Already scanned: " + decodedText;
        resultEl.className = "duplicate";
        beep.play(); // صوت حتى على الكود المكرر إذا بغيت، أو ممكن نحيد
        return;
    }

    // URL Google Script
    var url = "https://script.google.com/macros/s/AKfycbwyhRPVm0o5LsaG6kge7fd9fJjyMiKRvhq3UpQSV3yYn_reTGZdrqotiPfeMBFBxm4/exec?code=" + encodeURIComponent(decodedText);

    fetch(url)
        .then(response => response.text())
        .then(data => {
            resultEl.innerText = "Saved: " + decodedText;
            resultEl.className = "saved";

            // تشغيل الصوت beep
            beep.play();

            // تحديث قائمة آخر 5 QR codes
            historyList.unshift(decodedText);
            if(historyList.length > 5) historyList.pop();

            let historyHTML = historyList.map(code => `<li>${code}</li>`).join('');
            document.getElementById("history").innerHTML = historyHTML;
        })
        .catch(error => {
            resultEl.innerText = "Error saving: " + error;
            resultEl.className = "duplicate";
        });
}

// تشغيل Scanner
scanner = new Html5QrcodeScanner("reader", { fps: 10 });
scanner.render(onScanSuccess);
</script>

</body>
</html>
